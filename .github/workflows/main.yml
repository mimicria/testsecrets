name: Find Secrets
on: push

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  secret:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Gitleaks
      id: gitleaks
      continue-on-error: true
      run: |
        curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks
        chmod +x /usr/local/bin/gitleaks
        mkdir -p scan_results
        gitleaks dir \
          --report-path "scan_results/gitleaks.raw.sarif" \
          --report-format sarif \
          "$GITHUB_WORKSPACE"
         
    - name: Fix SARIF paths (convert absolute to relative)
      run: |
        # Создаём копию с относительными путями
        cat scan_results/gitleaks.raw.sarif | \
          sed "s|$GITHUB_WORKSPACE/||g" > \
          scan_results/gitleaks.sarif
        
        # Опционально: показываем разницу (для отладки)
        echo "First few lines of fixed SARIF:"
        head -n 20 scan_results/gitleaks.sarif

    - name: Upload scan results as artifacts
      if: steps.gitleaks.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: gitleaks-scan-results
        path: scan_results/*.sarif
        retention-days: 30

    - name: Upload SARIF to GitHub Security
      if: always() && hashFiles('scan_results/gitleaks.sarif') != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: scan_results/gitleaks.sarif
        category: gitleaks-scanner

    - name: trufflehog
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --results=verified,unknown
